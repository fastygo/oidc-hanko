account:
  allow_deletion: true
  allow_signup: false

database:
  user: hanko
  password: "change-me-strong-db-password"
  host: hanko-db
  port: "5432"
  dialect: postgres
  database: hanko

email:
  enabled: true
  optional: false
  acquire_on_registration: true
  acquire_on_login: false
  require_verification: false
  limit: 100
  use_as_login_identifier: true
  max_length: 100
  use_for_authentication: true
  passcode_ttl: 300

email_delivery:
  enabled: false
  from_address: noreply@cybeross.ru
  from_name: CyberOS

# MVP: keep the authentication flow limited to email + password only.
mfa:
  enabled: false
  optional: true
  acquire_on_registration: false
  acquire_on_login: false

passkey:
  enabled: false
  optional: true
  acquire_on_registration: never
  acquire_on_login: never

password:
  enabled: true
  optional: false
  acquire_on_registration: always
  acquire_on_login: always
  min_length: 8

# SAML is disabled — Hanko is NOT a SAML SP in this architecture.
# It serves only as the credential backend; the Go IdP handles SAML.
saml:
  enabled: false

secrets:
  keys:
    - "change-me-32-byte-random-secret"

server:
  public:
    address: ":5700"
    cors:
      allow_origins:
        - "https://idp.cybeross.ru"
      allow_credentials: true

service:
  name: CyberOS Authentication

session:
  lifespan: 1h
  cookie:
    domain: cybeross.ru
    http_only: true
    same_site: none
    secure: true

webauthn:
  relying_party:
    id: cybeross.ru
    display_name: CyberOS
    origins:
      - "https://idp.cybeross.ru"
  timeouts:
    registration: 60000
    login: 60000
